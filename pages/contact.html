<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Rendelco</title>
  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>
  <header class="site-header">
    <nav class="navbar">
      <a href="../index.html" class="navbar-brand">
        <span class="navbar-logo" aria-hidden="true">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M8 8h8v20M8 8l14 10M16 18h10" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="navbar-brand-name">Rendelco</span>
      </a>
      <button type="button" class="navbar-toggler" aria-label="Toggle menu" aria-expanded="false">
        <span class="toggler-bar"></span>
        <span class="toggler-bar"></span>
        <span class="toggler-bar"></span>
      </button>
      <ul class="navbar-menu">
        <li><a href="../index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
      <div class="navbar-overlay" aria-hidden="true"></div>
    </nav>
  </header>
  <main class="contact-page">
    <div class="contact-page-inner">
      <h1 class="contact-page-title">Request a Quote</h1>
      <p class="contact-page-lead">Fill out the form below or email us directly. We’ll get back to you shortly.</p>
      <form class="contact-form" id="contact-form" action="#" method="post">
        <label class="contact-label" for="contact-name">Name <span class="required">*</span></label>
        <input type="text" id="contact-name" name="name" class="contact-input" required placeholder="Your name">
        <label class="contact-label" for="contact-email">Email <span class="required">*</span></label>
        <input type="email" id="contact-email" name="email" class="contact-input" required placeholder="your@email.com">
        <label class="contact-label" for="contact-phone">Phone</label>
        <input type="tel" id="contact-phone" name="phone" class="contact-input" placeholder="Your phone number">
        <label class="contact-label" for="contact-project">Project type</label>
        <select id="contact-project" name="project" class="contact-input contact-select">
          <option value="">Select project type</option>
          <option value="residential">Residential Construction</option>
          <option value="commercial">Commercial Construction</option>
          <option value="renovation">Renovation</option>
          <option value="interior">Interior Design</option>
        </select>
        <label class="contact-label" for="contact-message">Message <span class="required">*</span></label>
        <textarea id="contact-message" name="message" class="contact-input contact-textarea" required rows="5" placeholder="Tell us about your project..."></textarea>
        <button type="submit" class="btn btn-primary contact-submit">Send Request</button>
      </form>
      <p class="contact-via-email">Or contact us via email: <a href="mailto:info@rendelco.com?subject=Quote%20Request">info@rendelco.com</a></p>
    </div>
  </main>
  <footer></footer>
  <script src="../js/main.js"></script>
  <script>
    (function () {
      var form = document.getElementById('contact-form');
      if (form) {
        form.addEventListener('submit', function (e) {
          e.preventDefault();
          var name = encodeURIComponent(document.getElementById('contact-name').value.trim());
          var email = encodeURIComponent(document.getElementById('contact-email').value.trim());
          var phone = encodeURIComponent(document.getElementById('contact-phone').value.trim());
          var project = encodeURIComponent(document.getElementById('contact-project').value.trim());
          var message = encodeURIComponent(document.getElementById('contact-message').value.trim());
          var subject = 'Quote Request - ' + (document.getElementById('contact-project').selectedOptions[0] ? document.getElementById('contact-project').selectedOptions[0].text : 'General');
          var body = 'Name: ' + decodeURIComponent(name) + '\nEmail: ' + decodeURIComponent(email) + '\nPhone: ' + decodeURIComponent(phone) + '\nProject type: ' + decodeURIComponent(project) + '\n\nMessage:\n' + decodeURIComponent(message);
          var mailto = 'mailto:info@rendelco.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
          window.location.href = mailto;
        });
      }
    })();
  </script>
</body>
</html>
